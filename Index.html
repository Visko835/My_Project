'ItenGen'Gen'TYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zuxski File Explorer</title>
    <style>
        body {
            background: #0a0e27;
            color: #00ff88;
            font-family: 'Courier New', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            width: 100%;
            max-width: 600px;
            text-align: center;
        }
        h1 { text-shadow: 0 0 10px #00ff88; margin-bottom: 5px; }
        .subtitle { color: #888; font-size: 0.9em; margin-bottom: 30px; }
        
        .file-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            text-align: left;
        }
        
        .file-item {
            padding: 15px 20px;
            background: rgba(0, 255, 136, 0.05);
            border: 1px solid #00ff88;
            border-radius: 8px;
            text-decoration: none;
            color: #00ff88;
            font-weight: bold;
            transition: all 0.3s ease;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .file-item:hover {
            background: #00ff88;
            color: #0a0e27;
            transform: translateX(10px);
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.5);
        }

        .file-icon { font-size: 1.2em; }
        .status { margin-top: 20px; color: #ff4444; font-size: 0.9em; }
        .loading { color: #ffff00; }
    </style>
</head>
<body>

    <div class="container">
        <h1> ZUXSKI EXPLORER</h1>
        <p class="subtitle">Mendeteksi file di Repository GitHub...</p>
        
        <div id="fileList" class="file-list">
            <div class="loading">⏳ Sedang memindai repository...</div>
        </div>
        
        <div id="status" class="status"></div>
    </div>

    <script>
        // ️ KONFIGURASI (GANTI SESUAI NAMA REPO LU)
        const GITHUB_USERNAME = 'Visko835'; 
        const REPO_NAME = 'My_Project'; // <-- GANTI DENGAN NAMA REPO HTML LU
        const TARGET_FOLDER = ''; // Kosongkan jika file ada di root. Isi 'folder' jika di dalam folder.

        async function detectFiles() {
            const listContainer = document.getElementById('fileList');
            const statusDiv = document.getElementById('status');

            try {
                // Memanggil GitHub API untuk melihat isi folder
                const apiUrl = `https://api.github.com/repos/${GITHUB_USERNAME}/${REPO_NAME}/contents/${TARGET_FOLDER}`;
                
                const response = await fetch(apiUrl);
                
                if (!response.ok) {
                    throw new Error(`Gagal akses API (Status: ${response.status}). Pastikan Repo PUBLIC!`);
                }

                const files = await response.json();

                
                listContainer.innerHTML = '';

              
                const htmlFiles = files.filter(file => file.name.endsWith('.html') && file.type === 'file');

                if (htmlFiles.length === 0) {
                    listContainer.innerHTML = '<div class="status">Tidak ada file HTML yang terdeteksi.</div>';
                    return;
                }

              
                htmlFiles.forEach(file => {
                    const link = document.createElement('a');
                    link.href = file.name; 
                    link.className = 'file-item';
                    link.innerHTML = `
                        <span>📄 ${file.name.replace('.html', '')}</span>
                        <span class="file-icon">➡️</span>
                    `;
                    listContainer.appendChild(link);
                });

            } catch (error) {
                listContainer.innerHTML = '';
                statusDiv.innerText = `❌ Error: ${error.message}`;
            }
      
        detectFiles();
    </script>

</body>
</html>
